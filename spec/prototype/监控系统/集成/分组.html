<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueKing Lite - 资产管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            color: #313238;
            min-height: 100vh;
            font-size: 14px;
        }

        /* ==================== 顶部导航栏 ==================== */
        .top-header {
            background: #fff;
            height: 60px;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 18px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 50%, #699eff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(58, 132, 255, 0.25);
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
        }

        .app-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #f5f7fa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #646a73;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-switcher:hover {
            background: rgba(0, 82, 217, 0.06);
            color: #0052d9;
        }

        .app-switcher svg {
            width: 16px;
            height: 16px;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            margin-left: 48px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #646a73;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            text-decoration: none;
        }

        .nav-item:hover {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.06);
        }

        .nav-item.active {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.1);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
        }

        a.nav-item {
            text-decoration: none;
        }

        a.nav-item:hover,
        a.nav-item.active {
            color: #0052d9;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #646a73;
            font-size: 14px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .header-icon:hover {
            background: rgba(0, 0, 0, 0.04);
            color: #0052d9;
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            color: #646a73;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(58, 132, 255, 0.25);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .user-info:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .user-info svg {
            width: 14px;
            height: 14px;
            color: #979ba5;
        }

        /* ==================== 二级导航 ==================== */
        .sub-header {
            background: #fff;
            height: 48px;
            border-bottom: 1px solid #dcdee5;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .sub-nav {
            display: flex;
            gap: 4px;
        }

        .sub-nav-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #63656e;
            border-radius: 4px;
            font-weight: 500;
            text-decoration: none;
        }

        .sub-nav-item:hover {
            color: #3a84ff;
            background: #e1ecff;
        }

        .sub-nav-item.active {
            color: #3a84ff;
            background: #e1ecff;
        }

        a.sub-nav-item {
            text-decoration: none;
            color: inherit;
        }

        /* ==================== 主内容区 ==================== */
        .main-container {
            display: flex;
            height: calc(100vh - 108px);
        }

        /* ==================== 左侧导航 ==================== */
        .left-sidebar {
            width: 260px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 16px 0 16px 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid #dcdee5;
        }

        /* 搜索框 */
        .search-box {
            padding: 16px;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #979ba5;
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            border: 1px solid #dcdee5;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        .search-input:focus {
            border-color: #3a84ff;
        }

        /* 树形菜单 */
        .tree-menu {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px;
        }

        .tree-node {
            user-select: none;
            margin-bottom: 4px;
        }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .tree-node-content:hover {
            background: #f5f7fa;
        }

        .tree-node-content.active {
            background: #e1ecff;
            color: #3a84ff;
        }

        .tree-node-icon {
            width: 20px;
            margin-right: 8px;
            color: #979ba5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .tree-node-icon.expanded {
            transform: rotate(90deg);
            color: #3a84ff;
        }

        .tree-node-label {
            flex: 1;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .category-icon {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: #e1ecff;
            color: #3a84ff;
        }

        .tree-children {
            display: none;
            padding-left: 28px;
            margin-top: 4px;
        }

        .tree-children.expanded {
            display: block;
        }

        .all-items {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 0 0 12px 0;
            cursor: pointer;
            border-radius: 4px;
            background: #e1ecff;
        }

        .all-items:hover {
            background: #d4e3fc;
        }

        .all-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: #3a84ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        /* ==================== 右侧内容区域 ==================== */
        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f7fa;
        }

        /* 内容标题 */
        .content-header {
            margin-bottom: 20px;
        }

        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #313238;
            margin-bottom: 8px;
        }

        .content-subtitle {
            font-size: 14px;
            color: #63656e;
        }

        /* 表格容器 */
        .table-container {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #dcdee5;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead {
            background: #fafbfd;
        }

        .data-table th {
            padding: 14px 20px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #313238;
            border-bottom: 1px solid #dcdee5;
        }

        .data-table tbody tr {
            border-bottom: 1px solid #dcdee5;
        }

        .data-table tbody tr:hover {
            background: #f5f7fa;
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 14px 20px;
            font-size: 14px;
            color: #313238;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-type {
            background: #e1ecff;
            color: #3a84ff;
        }

        .tag-org {
            background: #e8f8e8;
            color: #2dcb56;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: #f5f7fa;
            color: #63656e;
        }

        .btn-action:hover {
            background: #e1ecff;
            color: #3a84ff;
        }

        .btn-edit:hover {
            background: #e1ecff;
            color: #3a84ff;
        }

        .btn-delete:hover {
            background: #ffeded;
            color: #ea3636;
        }

        /* 表格头部 */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid #dcdee5;
        }

        .table-search-wrapper {
            position: relative;
            width: 280px;
        }

        .table-search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #979ba5;
            font-size: 14px;
        }

        .table-search-input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border: 1px solid #dcdee5;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .table-search-input:focus {
            border-color: #3a84ff;
        }

        .btn-add {
            padding: 8px 20px;
            background: #3a84ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-add:hover {
            background: #306ed0;
        }

        /* 弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        /* 弹窗容器 */
        .modal {
            background: white;
            border-radius: 4px;
            width: 600px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        /* 弹窗标题栏 */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid #dcdee5;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #313238;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #63656e;
        }

        .modal-close:hover {
            background: #f5f7fa;
            color: #313238;
        }

        /* 弹窗内容 */
        .modal-body {
            padding: 24px;
            max-height: calc(90vh - 140px);
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #313238;
            font-weight: 500;
        }

        .form-label .required {
            color: #ea3636;
            margin-right: 4px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dcdee5;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: #3a84ff;
        }

        /* 条件规则样式 */
        .condition-group {
            background: #fafbfd;
            border: 1px solid #dcdee5;
            border-radius: 4px;
            padding: 16px;
        }

        .condition-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .condition-row:last-child {
            margin-bottom: 0;
        }

        .condition-row .form-select,
        .condition-row .form-input {
            flex: 1;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .btn-icon:hover {
            background: #f5f7fa;
        }

        .btn-add-condition {
            margin-top: 12px;
            padding: 6px 12px;
            background: transparent;
            color: #3a84ff;
            border: 1px dashed #3a84ff;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-add-condition:hover {
            background: #e1ecff;
        }

        /* 弹窗底部 */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid #dcdee5;
            background: #fafbfd;
        }

        .btn-cancel,
        .btn-confirm {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-cancel {
            background: #f5f7fa;
            color: #63656e;
        }

        .btn-cancel:hover {
            background: #eaebf0;
        }

        .btn-confirm {
            background: #3a84ff;
            color: white;
        }

        .btn-confirm:hover {
            background: #306ed0;
        }

        /* 滚动条样式 */
        .tree-menu::-webkit-scrollbar,
        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .tree-menu::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .tree-menu::-webkit-scrollbar-thumb,
        .content-area::-webkit-scrollbar-thumb {
            background: #dcdee5;
            border-radius: 3px;
        }

        .tree-menu::-webkit-scrollbar-thumb:hover,
        .content-area::-webkit-scrollbar-thumb:hover {
            background: #c4c6cc;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>

                    </svg>
                </div>
                <span>BlueKing Lite</span>
            </div>
            <div class="app-switcher">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            </div>
            <nav class="header-nav">
                <a href="../视图/视图.html" class="nav-item">

                        <rect x="3" y="3" width="7" height="7"/>

                    <span>视图</span>
                </a>
                <a href="../搜索/搜索.html" class="nav-item">

                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <span>搜索</span>
                </a>
                <a href="../事件/告警.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    </svg>
                    <span>事件</span>
                </a>
                <a href="集成.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 11a9 9 0 0 1 9 9"/>
                        <path d="M4 4a16 16 0 0 1 16 16"/>
                        <circle cx="5" cy="19" r="1"/>
                    </svg>
                    <span>集成</span>
                </a>
            </nav>
        </div>
        <div class="header-right">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </div>
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
            </div>
            <div class="user-info">
                <div class="user-avatar">陈</div>
                <span>陈润翼</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9l6 6 6-6"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 二级导航 -->
    <div class="sub-header">
        <nav class="sub-nav">
            <a href="集成.html" class="sub-nav-item">集成</a>
            <a href="资产.html" class="sub-nav-item">资产</a>
            <a href="分组.html" class="sub-nav-item active">分组</a>
            <a href="对象.html" class="sub-nav-item">对象</a>
        </nav>
    </div>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧导航 -->
        <div class="left-sidebar">
            <!-- 搜索框 -->
            <div class="search-box">
                <div class="search-input-wrapper">
                    <span class="search-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
                    <input type="text" class="search-input" placeholder="搜索...">
                </div>
            </div>

            <!-- 树形菜单 -->
            <div class="tree-menu">
                <!-- 全部 -->
                <div class="all-items">
                    <div class="all-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
                    <span>全部</span>
                </div>

                <!-- 操作系统 -->
                <div class="tree-node">
                    <div class="tree-node-content" onclick="toggleNode(this)">

    <script>
        // 打开弹窗
        function openModal() {
            document.getElementById('modalOverlay').classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // 点击遮罩层关闭弹窗
        function closeModalOnOverlay(event) {
            if (event.target.id === 'modalOverlay') {
                closeModal();
            }
        }

        // 确认弹窗
        function confirmModal() {
            // 这里可以添加表单验证和提交逻辑
            alert('规则已保存');
            closeModal();
        }

        // 添加条件
        function addCondition() {
            const conditionGroup = document.querySelector('.condition-group');
            const newCondition = document.createElement('div');
            newCondition.className = 'condition-row';
            newCondition.innerHTML = `
                <select class="form-select">
                    <option>instance_id</option>
                    <option>hostname</option>
                    <option>ip_address</option>
                </select>
                <select class="form-select">
                    <option>=</option>
                    <option>!=</option>
                    <option>></option>
                    <option><</option>
                </select>
                <input type="text" class="form-input" placeholder="请输入值">
                <button class="btn-icon" onclick="removeCondition(this)">✕</button>
            `;
            conditionGroup.insertBefore(newCondition, conditionGroup.querySelector('.btn-add-condition'));
        }

        // 删除条件
        function removeCondition(button) {
            const conditionRows = document.querySelectorAll('.condition-row');
            if (conditionRows.length > 1) {
                button.closest('.condition-row').remove();
            } else {
                alert('至少需要保留一个条件');
            }
        }

        // 切换树节点展开/收起
        function toggleNode(element) {
            const parent = element.parentElement;
            const children = parent.querySelector('.tree-children');
            const icon = element.querySelector('.tree-node-icon');
            
            if (children) {
                children.classList.toggle('expanded');
                icon.classList.toggle('expanded');
            }
        }

        // 默认展开操作系统节点
        window.addEventListener('DOMContentLoaded', () => {
            const firstNode = document.querySelector('.tree-node .tree-node-content');
            if (firstNode) {
                toggleNode(firstNode);
            }
        });

        // 二级导航切换
        document.querySelectorAll('.sub-nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sub-nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 树节点选中
        document.querySelectorAll('.tree-node-content').forEach(node => {
            if (!node.querySelector('.tree-node-icon')) return;
            
            node.addEventListener('click', function(e) {
                // 如果点击的是展开图标，不处理选中
                if (e.target.classList.contains('tree-node-icon')) return;
                
                document.querySelectorAll('.tree-node-content').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 表格搜索功能
        function filterTable() {
            const searchInput = document.getElementById('tableSearchInput');
            const filter = searchInput.value.toLowerCase();
            const table = document.querySelector('.data-table tbody');
            const rows = table.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const cells = row.getElementsByTagName('td');
                let found = false;

                // 搜索规则名称、对象类型、规则概述、组织列
                for (let j = 0; j < cells.length - 1; j++) { // 排除最后一列操作按钮
                    const cellText = cells[j].textContent || cells[j].innerText;
                    if (cellText.toLowerCase().indexOf(filter) > -1) {
                        found = true;
                        break;
                    }
                }

                // 显示或隐藏行
                if (found) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }
    </script>
